# ============================================================
# Alembic 主配置文件（alembic.ini）
# ------------------------------------------------------------
# 这个文件是 Alembic 的“全局设置”，告诉 Alembic 去哪里找迁移脚本、
# 怎么记日志等。真正的数据库连接地址不写死在这里，
# 而是由 env.py 用项目配置动态填入（见 env.py 中的 set_main_option）。
# ============================================================

[alembic]
# 迁移脚本（就是 versions/ 目录下的 .py 文件）所在位置
script_location = alembic
# 把当前目录加入 Python 搜索路径，使 env.py 能 import 到项目里的 app 包
prepend_sys_path = .
# 路径分隔符风格（os 表示跟随操作系统：Windows 用 \，Linux/Mac 用 /）
path_separator = os

# ---- 以下为日志（logging）配置，控制迁移时在终端打印哪些信息 ----
[loggers]
# 要记录日志的组件：root（根）、sqlalchemy（ORM 引擎）、alembic（迁移工具）
keys = root,sqlalchemy,alembic

[handlers]
# 日志输出处理器：这里只用 console（打印到终端）
keys = console

[formatters]
# 日志格式器：generic 一种即可
keys = generic

# 根日志器：只显示 WARN 及以上级别，输出到 console
[logger_root]
level = WARN
handlers = console
qualname =

# SQLAlchemy 引擎日志：WARN 及以上，不单独挂 handler（继承 root 的控制台）
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic 自身日志：INFO 及以上（迁移进度、执行的 SQL 等会显示出来）
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# 控制台处理器：标准错误输出（stderr），级别不限（由上面 logger 控制）
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# 日志格式：[级别] [组件名] 消息，时间显示 时:分:秒
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
