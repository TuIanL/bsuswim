services:
  postgres:
    image: postgres:16
    container_name: bsuswim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: swim
      POSTGRES_PASSWORD: swim
      POSTGRES_DB: swim_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bsuswim-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: bsuswim-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: swim_minio
      MINIO_ROOT_PASSWORD: swim_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
